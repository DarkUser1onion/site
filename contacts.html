    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Share+Tech+Mono&display=swap" rel="stylesheet">

</head>
<body>
    <div class="cap">
        <div class="capper">user@arch ~❯ mail -s "hello" admin</div>
        <div class="nav">
            <a href="index.html" class="nav-btn">[ТЕОРИЯ]</a>
            <a href="practice.html" class="nav-btn">[ПРАКТИКА]</a>
            <a href="about.html" class="nav-btn">[О ПРОЕКТЕ]</a>
            <a href="contacts.html" class="nav-btn" style="color: var(--pink);animation: soft-text-pulse 2.5s infinite ease-in-out;">[КОНТАКТЫ]</a>
            <a href="shop.html" class="nav-btn" style="color: var(--pink);">
                [МАГАЗИН <span style="color: var(--cyan);">🨁</span><span id="cart-count" style="color: var(--cyan);">0</span>]
            </a>

    <main>
        <h1>🖄 СВЯЗАТЬСЯ 🖄</h1>
        <h2>Задай вопрос или предложи идею</h2>

        <section class="section">
            <form class="cyber-form" action="#" method="post">
                <label for="name">Имя</label>
                <input type="text" id="name" name="name" placeholder="arch_user" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="user@example.com" required>

                <label for="message">Сообщение</label>
                <textarea id="message" name="message" rows="5" placeholder="Ваш вопрос..." required></textarea>

                <button type="submit" class="submit-btn">[ ОТПРАВИТЬ ]</button>
            </form>
        </section>

        <div class="grid-container" style="margin-top:20px;">
            <div class="grid-item">
                <h1 style="font-size: 25px;">Telegram</h1>
                <a href="https://t.me/linux_x64" class="cmd" target="Starfall">
                    <p>@linux_x64</p>
                </a>
            </div>
            <div class="grid-item">
                <h1 style="font-size: 25px;">GitHub</h1>
                <a href="https://github.com/DarkUser1onion/site/tree/main" class="cmd" target="Starfall">
                    <p>/DarkUser1onion/site/tree/main</p>
                </a>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-nav">
            <a href="index.html">ТЕОРИЯ</a>
